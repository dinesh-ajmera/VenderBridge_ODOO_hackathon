<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
</head>
<body>

    <h1>VendorBridge Signup</h1>

    <form method="POST">

        <input type="text"
               name="name"
               placeholder="Enter Name">

        <br><br>

        <input type="email"
               name="email"
               placeholder="Enter Email">

        <br><br>

        <input type="password"
               name="password"
               placeholder="Enter Password">

        <br><br>

        <select name="role">
            <option>Admin</option>
            <option>Manager</option>
            <option>Procurement</option>
            <option>Vendor</option>
        </select>

        <br><br>

        <button type="submit">
            Sign Up
        </button>

    </form>

</body>
</html>
