<!DOCTYPE html>
<html>
<head>
    <title>RFQs</title>
</head>
<body> <nav><div style="padding:10px;background:#f0f0f0">

<a href="/dashboard">Dashboard</a> |

<a href="/vendors">Vendors</a> |

<a href="/rfqs">RFQs</a> |

<a href="/quotations">Quotations</a>

</div>

<hr></nav>
<h1>RFQ List</h1>

<table border="1">

<tr>
    <th>ID</th>
    <th>Title</th>
    <th>Quantity</th>
    <th>Deadline</th>
    <th>Status</th>
    <th>Submit Quote</th>
    <th>Compare Quotes</th>
</tr>

{% for rfq in rfqs %}

<tr>
    <td>{{ rfq.id }}</td>
    <td>{{ rfq.title }}</td>
    <td>{{ rfq.quantity }}</td>
    <td>{{ rfq.deadline }}</td>
    <td>{{ rfq.status }}</td>
    <td><a href="/submit_quotation/{{ rfq.id }}">
    Submit Quote
</a>
</td>
    <td><a href="/compare/{{ rfq.id }}">
    Compare Quotes
</a></td>




</tr>

{% endfor %}

</table>

</body>
</html>
