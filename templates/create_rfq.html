<h1>Create RFQ</h1>

<form method="POST">

    <input type="text"
           name="title"
           placeholder="RFQ Title" required>

    <br><br>

    <textarea
        name="description"
        placeholder="Description" required>
    </textarea>

    <br><br>

    <input type="number"
           name="quantity"
           min="1"
           placeholder="Quantity" required > 

    <br><br>

    <input type="date"
           name="deadline"
           required>

    <br><br>

    <button type="submit">
        Create RFQ
    </button>

</form>

</body>
</html>
